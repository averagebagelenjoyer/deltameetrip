<html>

<head>
  <title>Delta Meet</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    .title {
      top: 0px;
      width: 100%;
      max-width: 100%;
      z-index: 1;
      display: block;

      position: absolute;
      background-color: #444444;
      color: white;
      margin: 0;
    }

    .entry-modal {
      border: 1px solid #444444;
      width: 300px;
      margin: auto;
      z-index: 9999;
      position: absolute;
      left: 50%;
      top: 70px;
      margin-left: -150px;
      padding: 5px;
      color: #fff;
      background-color: #444444;
      text-align: center;
    }

    #notification {
      position: absolute;
      z-index: 1;
      text-align: center;
      color: #fff;
      margin: 0;
      top: 47.33px;
      font-size: 18pt;
      width: 100%;
      background-color: orange;
    }


    .room-input {
      border: none;
      padding: 5px;
    }

    button {
      margin: 3px;
      padding: 5px;
    }

    #remote-video {
      top: 0px;
      height: 100%;
      width: 100%;
      left: 0px;
      background-color: lightgray;
      position: absolute;
    }

    #local-video {
      top: 60px;
      width: 300px;
      object-fit: cover;
      height: 150px;
      z-index: 1;
      right: 15px;
      background-color: #444444;
      position: absolute;
    }

    .meet-controls-bar {
      bottom: 0px;
      background-color: black;
      left: 0px;
      position: absolute;
      width: 100%;
    }
  </style>
</head>

<body>
  <h1 class="title">Delta Meet</h1>
  <p id="notification" hidden></p>
  <div class="entry-modal" id="entry-modal">
    <p>Create or Join Meeting</p>
    <input id="room-input" class="room-input" placeholder="Enter Room ID">
    <div>
      <button onclick="joinRoom();">Join Room</button>
    </div>
  </div>
  <div class="meet-area">
    <video id="remote-video" playsinline autoplay></video>

    <video id="local-video" playsinline autoplay muted></video>
  </div>
</body>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
  const remoteVideo = document.getElementById("remote-video");

  const PRE = "DELTA"
  const SUF = "MEET"
  var room_id;
  var local_stream;
  var screenStream;
  var peer = null;
  var currentPeer = null

  function setLocalStream(stream) {
    let video = document.getElementById("local-video");
    video.srcObject = stream;
    video.muted = true;
    video.play().catch(() => {
      console.log("iOS requires user interaction before video can play");
    });;
  }
  function setRemoteStream(stream) {
    let video = document.getElementById("remote-video");
    video.srcObject = stream;
    video.play().catch(() => {
      console.log("iOS requires user interaction before video can play");
    });;
  }

  function hideModal() {
    document.getElementById("entry-modal").hidden = true
  }

  function notify(msg) {
    let notification = document.getElementById("notification")
    notification.innerHTML = msg
    notification.hidden = false
    setTimeout(() => {
      notification.hidden = true;
    }, 3000)
  }

  function joinRoom() {
    console.log("Joining Room")
    let room = document.getElementById("room-input").value;
    if (room == " " || room == "") {
      alert("Please enter room number")
      return;
    }
    room_id = PRE + room + SUF;
    hideModal()

    navigator.mediaDevices.getUserMedia({ video: true, audio: true })
      .then(stream => {
        local_stream = stream;
        setLocalStream(local_stream)

        peer = new Peer({
          secure: true,
          host: "0.peerjs.com",
          port: 443,
          path: "/"
        })
        peer.on("open", (id) => {
          console.log("Connected with Id: " + id)
          notify("Joining peer")

          let call = peer.call(room_id, stream)
          call.on("stream", (stream) => {
            setRemoteStream(stream);
          });

          currentPeer = call;
        });
      })
      .catch(err => console.log(err));
  }

  window.onbeforeunload = (e) => {
    e.preventDefault();
    e.returnValue = "";
  };

  document.body.addEventListener("click", () => {
    remoteVideo.muted = true;
    remoteVideo.play();
  }, { once: true });
</script>

</html>
